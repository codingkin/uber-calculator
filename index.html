<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .clock {
            font-size: 2rem;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Digital Clock</h1>
    <div class="clock" id="utcClock"></div>
    <div class="clock" id="estClock"></div>
    <div class="clock" id="pstClock"></div>
    <script>
        function updateClocks() {
            const utcDate = new Date();
            const utcTime = utcDate.toUTCString().slice(17, 25);
            document.getElementById('utcClock').innerHTML = `UTC: ${utcTime}`;
            const estOffset = -5 * 60 * 60 * 1000;
            const pstOffset = -8 * 60 * 60 * 1000;
            const estDate = new Date(utcDate.getTime() + estOffset);
            const pstDate = new Date(utcDate.getTime() + pstOffset);
            const estTime = estDate.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
            const pstTime = pstDate.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
            document.getElementById('estClock').innerHTML = `EST: ${estTime}`;
            document.getElementById('pstClock').innerHTML = `PST: ${pstTime}`;
        }
        setInterval(updateClocks, 1000);
        updateClocks();
    </script>
</body>
</html>
